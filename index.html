<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Master Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { height: 3px; width: 3px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        
        .active-tab {
            background-color: rgba(16, 185, 129, 0.15) !important;
            color: #10b981 !important;
            border-bottom: 2px solid #10b981 !important;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        iframe {
            width: 100%;
            height: calc(100vh - 66px); /* Ultra compact header adjustment */
            border: none;
            background: #ffffff;
        }

        .loader-spinner {
            border: 2px solid rgba(16, 185, 129, 0.1);
            border-top: 2px solid #10b981;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#05070a] text-white font-sans m-0 p-0 overflow-hidden">

    <!-- ULTRA COMPACT MASTER HEADER -->
    <header class="border-b border-slate-800/40 bg-slate-900/60 backdrop-blur-md sticky top-0 z-50">
        <!-- Top Bar: Extremely Compact -->
        <div class="flex items-center justify-between px-3 py-1 border-b border-slate-800/20">
            <div class="flex items-center gap-2">
                <div class="w-5 h-5 bg-emerald-600 rounded-sm flex items-center justify-center shadow-lg shadow-emerald-900/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <h1 class="text-[11px] font-black text-white uppercase tracking-tight">Main Master</h1>
                <div class="flex items-center gap-1 ml-2 px-1.5 py-0.5 bg-emerald-500/5 rounded border border-emerald-500/10">
                    <span class="w-1 h-1 rounded-full bg-emerald-500 animate-pulse"></span>
                    <span class="text-[8px] font-bold text-emerald-500 uppercase tracking-tighter">System Live</span>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <div id="loading-indicator" class="hidden flex items-center gap-1.5 text-[8px] text-emerald-400 font-bold uppercase tracking-widest">
                    <div class="loader-spinner"></div>
                    Syncing...
                </div>
                <button onclick="openExternal()" class="text-slate-400 hover:text-emerald-400 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Navigation Tabs: White Font with Green Highlight -->
        <nav id="tabs-container" class="flex items-center gap-0 overflow-x-auto no-scrollbar bg-slate-950/40 px-1">
            <!-- Tabs generated by JS -->
        </nav>
    </header>

    <!-- Content Area -->
    <main class="relative bg-black">
        <div id="overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-[#05070a] z-10 hidden">
            <div class="loader-spinner !w-6 !h-6 !border-2 mb-2"></div>
            <p class="text-[8px] font-bold text-emerald-500/40 uppercase tracking-[0.2em]">Master Linking...</p>
        </div>
        <iframe id="main-frame" src="" title="Main Master View"></iframe>
    </main>

    <script>
        const projects = [
            { title: "Import Dashboard", url: "https://sk466317.github.io/import-dashboard/" },
            { title: "Import Tariff", url: "https://sk466317.github.io/Import-Tariff/" },
            { title: "Export Plan", url: "https://sk466317.github.io/export-plan/" },
            { title: "Trident Invoice", url: "https://sk466317.github.io/Trident-Invoice/" },
            { title: "Rail Tariff", url: "https://sk466317.github.io/Export-Rail-Tariff/" },
            { title: "Pendency Check", url: "https://sk466317.github.io/Export-Pendency/" }
        ];

        const tabsContainer = document.getElementById('tabs-container');
        const mainFrame = document.getElementById('main-frame');
        const overlay = document.getElementById('overlay');
        const loader = document.getElementById('loading-indicator');

        function initTabs() {
            tabsContainer.innerHTML = '';
            
            projects.forEach((project, index) => {
                const btn = document.createElement('button');
                btn.className = "px-3 py-1.5 text-[9px] font-bold uppercase tracking-widest transition-all border-b-2 border-transparent text-white hover:text-emerald-400 hover:bg-emerald-500/5 hover:border-emerald-500/30 whitespace-nowrap";
                btn.innerText = project.title;
                btn.onclick = () => loadModule(index, btn);
                tabsContainer.appendChild(btn);
            });
            
            if(projects.length > 0) {
                setTimeout(() => {
                    const firstBtn = tabsContainer.querySelector('button');
                    if(firstBtn) firstBtn.click();
                }, 100);
            }
        }

        function loadModule(index, element) {
            const project = projects[index];
            overlay.classList.remove('hidden');
            loader.classList.remove('hidden');
            
            mainFrame.src = project.url;

            document.querySelectorAll('#tabs-container button').forEach(b => b.classList.remove('active-tab'));
            element.classList.add('active-tab');

            mainFrame.onload = () => {
                overlay.classList.add('hidden');
                loader.classList.add('hidden');
            };

            setTimeout(() => {
                overlay.classList.add('hidden');
                loader.classList.add('hidden');
            }, 4000);
        }

        function openExternal() {
            window.open(mainFrame.src, '_blank');
        }

        window.onload = initTabs;
    </script>
</body>
</html>
